<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login </title>
    <link rel="stylesheet" href="../css/sign.css" />
    <link rel="stylesheet" href="../css/variable.css" />
    <link rel="stylesheet" href="../css/bootstrap-icons-1.13.1/bootstrap-icons.css" />
</head>

<body>


    <main>
        <!-- Formulário de Login -->
        <form id="signIn">
            <i class="bi bi-person-circle"></i>

            <span>
                <i class="bi bi-person"></i>
                <input type="email" name="email" id="emailLog" placeholder="Digite seu e-mail" required />
            </span>

            <span>
                <i class="bi bi-lock"></i>
                <input type="password" name="password" id="passLog" placeholder="Digite sua senha" minlength="6"
                    maxlength="12" required />
            </span>

            <button type="submit">
                <i class="bi bi-box-arrow-in-right"></i> Entrar
            </button>

            <p class="no-account">
                Não tem uma conta?
            </p>
        </form>

        <!-- Formulário de Criar Conta -->
        <form id="signUp">
            <i class="bi bi-person-circle"></i>

            <span>
                <i class="bi bi-envelope"></i>
                <input type="email" name="email" id="emailReg" placeholder="Digite seu e-mail" required />
            </span>


            <span>
                <i class="bi bi-person"></i>
                <input type="text" name="nome" id="nameReg" placeholder="Digite seu nome" minlength="3" maxlength="27"
                    required />
            </span>


            <span>
                <i class="bi bi-lock"></i>
                <input type="password" name="password" id="passReg" placeholder="Crie uma senha" minlength="6"
                    maxlength="12" requir />
            </span>

            <span>
                <i class="bi bi-lock-fill"></i>
                <input type="password" name="confirmPassword" id="passReg2" placeholder="Confirme sua senha"
                    minlength="6" maxlength="12" required />
            </span>

            <button type="submit">
                <i class="bi bi-person-plus"></i> Criar Conta
            </button>

            <p class="no-account">
                Já tenho uma conta.
            </p>
        </form>

        <section class="alert">

        </section>
    </main>

    <script src="../js/sing.js"></script>
</body>

</html>
